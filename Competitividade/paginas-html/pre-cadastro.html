<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Competitividade/css/style.css">
    <title>Pré-cadastro</title>
</head>
<body>
    <div class="main-login">
        <div class="container-form-login">
            <!-- Lado da imagem -->
            <div class="login-image-side">
                <img src="/Competitividade/imagens/copia.png" alt="Imagem de login">
                <p class="image-text">Você mais conectado ao SUS, <br> seu sistema de saúde!</p>
            </div>

            <!-- Lado do formulário -->
            <div class="login-form-side">
                <a class="navClean" href="http://127.0.0.1:5500/Competitividade/index.html">Inicio</a>

                <div class="form-login-wrapper">
                    <h2 class="tittle-form">Pré cadastro</h2>

                    <div class="content-login">
                        <form id="preCadastroForm" onsubmit="handleSubmit(event)">
                            <p class="text-form">Nome</p>
                            <input type="text" class="nome-box-input" name="name" placeholder="Digite seu nome" required>
                            <br>
                            <p class="text-form">Sobrenome</p>
                            <input type="text" class="sobrenome-box-input" name="sobrenome" placeholder="Digite sobrenome" required>
                            <br>
                            <p class="text-form">Email</p>
                            <input type="email" class="email-box-input" name="email" placeholder="Digite seu email" required>
                            <br>
                            <p class="text-form">Idade</p>
                            <input type="text" class="idade-box-input" name="age" placeholder="Digite sua idade" required>
                            <br>
                            <p class="text-form">CPF</p>
                            <input type="text" class="cpf-box-input" name="cpf" placeholder="Digite seu CPF">
                            <br>
                            <p class="text-form">CRM (se for médico)</p>
                            <input type="text" class="crm-box-input" name="crm" placeholder="Digite seu CRM">
                            <br>
                            <button type="submit" class="preCadastro-box-button">Enviar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module">
        import { createUser } from '/Competitividade/script/api.js';

        window.handleSubmit = async (event) => {
            event.preventDefault();
            
            const formData = new FormData(event.target);
            const userData = {
                name: formData.get('name'),
                email: formData.get('email'),
                age: formData.get('age'),
                cpf: formData.get('cpf'),
                crm: formData.get('crm')
            };

            try {
                const user = await createUser(userData);
                alert('Cadastro realizado com sucesso!');
                window.location.href = '/Competitividade/paginas-html/login.html';
            } catch (error) {
                alert('Erro ao realizar cadastro. Por favor, tente novamente.');
                console.error('Error:', error);
            }
        };
    </script>
</body>
</html>
