<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Competitividade/css/style.css">
    <title>Login</title>
</head>
<body>  
    <div class="main-login">
        <div class="container-form-login">
            <!-- Lado da imagem -->
            <div class="login-image-side">
                <img src="/Competitividade/imagens/copia.png" alt="Imagem de login">
                <p class="image-text">Você mais conectado ao SUS, <br> seu sistema de saúde!</p>
            </div>

            <!-- Lado do formulário -->
            <div class="login-form-side">
                <a class="navClean" href="http://127.0.0.1:5500/Competitividade/index.html">Inicio</a>

                <div class="form-login-wrapper">
                    <h2 class="tittle-form">Login</h2> 

                    <div class="content-login">
                        <form id="loginForm" onsubmit="handleLogin(event)">
                            <p class="text-form">Email</p>
                            <input type="email" class="email-box-input" name="email" placeholder="Digite seu email" required>
                            <br>
                            <p class="text-form">Senha</p>
                            <input type="password" class="password-box-input" name="password" placeholder="Digite sua senha" required>
                            <br>
                            <button type="submit" class="login-box-button">Entrar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module">
        import { loginUser } from '/Competitividade/script/api.js';

        window.handleLogin = async (event) => {
            event.preventDefault();
            
            const formData = new FormData(event.target);
            const credentials = {
                email: formData.get('email'),
                password: formData.get('password')
            };

            try {
                const user = await loginUser(credentials);
                if (user.crm) {
                    window.location.href = '/Competitividade/paginas-html/painelMedico.html';
                } else {
                    window.location.href = '/Competitividade/paginas-html/perfilPaciente.html';
                }
            } catch (error) {
                alert('Email ou senha incorretos. Por favor, tente novamente.');
                console.error('Error:', error);
            }
        };
    </script>
</body>
</html>
